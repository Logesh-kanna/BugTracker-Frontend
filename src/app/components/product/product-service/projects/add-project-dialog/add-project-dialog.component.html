<h2 mat-dialog-title>Add Project</h2>
<mat-dialog-content>
  <form [formGroup]="formData" class="add-project-form">
    <mat-form-field appearance="fill">
      <mat-label>Project Name</mat-label>
      <input type="text" class="name" formControlName="projectName" matInput required>
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>Description</mat-label>
      <textarea type="text" class="name" formControlName="description" matInput required></textarea>
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>Start Date</mat-label>
      <input matInput [matDatepicker]="startDate" formControlName="startDate" placeholder="Choose a date"
        [matDatepickerFilter]="dateFilter">
      <mat-datepicker-toggle matSuffix [for]="startDate"></mat-datepicker-toggle>
      <mat-datepicker #startDate></mat-datepicker>
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>End Date</mat-label>
      <input matInput [matDatepicker]="endDate" formControlName="endDate" placeholder="Choose a date"
        [matDatepickerFilter]="dateFilter">
      <mat-datepicker-toggle matSuffix [for]="endDate"></mat-datepicker-toggle>
      <mat-datepicker #endDate></mat-datepicker>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-button [mat-dialog-close]="true" class="btn btn-primary" (click)="addProject()">Add</button>
</mat-dialog-actions>
